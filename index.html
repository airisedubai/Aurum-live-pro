function getStoredApiKey() {
  try { return localStorage.getItem(LS_KEY_STORAGE) || ""; } catch (e) { return ""; }

function setStoredApiKey(key) {
  try {
    if (key) localStorage.setItem(LS_KEY_STORAGE, key);

function formatPrice(id, price) {
  if (price === null || price === undefined || isNaN(price)) return "—";
  if (id === "gold" || id === "silver" || id === "oil") return price.toFixed(2);
  if (id === "xrp") return price.toFixed(4);
  if (id === "sol" || id === "bnb") return price.toFixed(2);
  return price >= 1000 ? price.toLocaleString(undefined, {maximumFractionDigits: 2}) : price.toFixed(2);
}

// ============================================================
// LIVE PRICE FETCHING
// ============================================================
async function fetchCoinGeckoPrices() {
  const ids = ASSETS.filter(a => a.source === "coingecko").map(a => a.cgId).join(",");
  const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("CoinGecko HTTP " + res.status);
  const json = await res.json();
  const out = {};
  ASSETS.filter(a => a.source === "coingecko").forEach(a => {
    const d = json[a.cgId];
    if (d && typeof d.usd === "number") {
      out[a.id] = { price: d.usd, change: d.usd_24h_change ?? 0, error: false };
    } else {
      out[a.id] = { error: true };
    }
  });
  return out;
}

async function fetchTwelveDataPrices() {
  const symbols = ASSETS.filter(a => a.source === "twelvedata").map(a => a.tdSymbol).join(",");
  const url = `https://api.twelvedata.com/quote?symbol=${encodeURIComponent(symbols)}&apikey=${TWELVEDATA_API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("TwelveData HTTP " + res.status);
  const json = await res.json();
  const bySymbol = json.symbol ? { [json.symbol]: json } : json;
  const out = {};
  ASSETS.filter(a => a.source === "twelvedata").forEach(a => {
    const d = bySymbol[a.tdSymbol];
    if (d && !d.code && typeof d.close !== "undefined") {
      out[a.id] = { price: parseFloat(d.close), change: parseFloat(d.percent_change ?? 0), error: false };
    } else {
      out[a.id] = { error: true };
    }
  });
  return out;
}

async function fetchAllPrices() {
  const results = {};
  try {
    Object.assign(results, await fetchCoinGeckoPrices());
  } catch (e) {
    console.warn("CoinGecko fetch failed:", e.message);
  }
  try {
    Object.assign(results, await fetchTwelveDataPrices());
  } catch (e) {
    console.warn("TwelveData fetch failed:", e.message);
  }
  return results;
}

// ============================================================
// CLAUDE ANALYSIS (cached per asset, real API call)
// ============================================================
async function fetchClaudeAnalysis(assetSym, price, changePct, apiKey) {
  if (!apiKey) throw new Error("NO_API_KEY");

  const prompt = `You are a trading analyst for AURUM PRO, a Dubai-based gold and crypto signal platform. Analyze ${assetSym} currently trading at ${price} (24h change: ${changePct > 0 ? "+" : ""}${changePct.toFixed(2)}%).

Respond ONLY with valid JSON, no markdown, no preamble, in this exact shape:
{
  "action": "BUY" | "SELL" | "HOLD",
  "confidence": "HIGH" | "MEDIUM" | "LOW",
  "confidencePct": <number 0-100>,
  "entryLow": <number>,
  "entryHigh": <number>,
  "stopLoss": <number>,
  "target1": <number>,
  "target2": <number>,
  "predict1d": <percent number, can be negative>,
  "predict1w": <percent number, can be negative>,
  "predict1m": <percent number, can be negative>,
  "bullish": <number 0-100>,
  "bearish": <number 0-100>,
  "reasons": [<3-5 short strings>],
  "risks": [<2-3 short strings>],
  "dubai": "<1-2 sentences on Dubai/UAE trading context for this asset>",
  "macro": "<1-2 sentences on macro outlook>"
}
Base entry/stop/targets realistically around the current price. Keep all string fields concise (under 100 chars each).`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    throw new Error(`Claude API HTTP ${res.status}: ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  const textBlock = data.content?.find(b => b.type === "text");
  if (!textBlock) throw new Error("No text in Claude response");

  let cleaned = textBlock.text.trim().replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "");
  return JSON.parse(cleaned);
}

async function fetchClaudeChatReply(assetSym, price, changePct, analysisData, history, userQuery, apiKey) {
  if (!apiKey) throw new Error("NO_API_KEY");

  const contextSummary = analysisData
    ? `Current signal: ${analysisData.action} (${analysisData.confidencePct}% confidence). Entry: ${analysisData.entryLow}-${analysisData.entryHigh}. Target1: ${analysisData.target1}. Stop: ${analysisData.stopLoss}. Reasons: ${(analysisData.reasons || []).join("; ")}.`
    : "No cached analysis available yet.";

  const systemPrompt = `You are AURUM PRO's trading assistant for a Dubai-based gold/crypto platform. The user is asking about ${assetSym}, currently trading at ${price} (24h change: ${changePct > 0 ? "+" : ""}${changePct.toFixed(2)}%). ${contextSummary}

Answer concisely (under 150 words), in a confident but honest trading-desk tone. This is not financial advice and you should not claim certainty about future prices. If asked about Dubai/UAE context, mention relevant local trading platforms or considerations briefly.`;

  const messages = history.slice(-6).map(m => ({ role: m.role, content: m.text }));
  messages.push({ role: "user", content: userQuery });

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 500,
      system: systemPrompt,
      messages: messages
    })
  });

  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    throw new Error(`Claude API HTTP ${res.status}: ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  const textBlock = data.content?.find(b => b.type === "text");
  return textBlock ? textBlock.text : "Sorry, I couldn't generate a response.";
}

// ---------- Rule-based fallback (used when no API key is set) ----------
function ruleBasedAnalysis(assetId, price, changePct) {
  const isUp = changePct >= 0;
  const magnitude = Math.abs(changePct);
  let action, confidence, confidencePct;

  if (magnitude > 3) { action = isUp ? "BUY" : "SELL"; confidence = "HIGH"; confidencePct = 75; }
  else if (magnitude > 1) { action = isUp ? "BUY" : "SELL"; confidence = "MEDIUM"; confidencePct = 60; }
  else { action = "HOLD"; confidence = "LOW"; confidencePct = 45; }

  const a = getAsset(assetId);
  const stopPct = assetId === "gold" ? 0.02 : 0.05;
  const targetPct = assetId === "gold" ? 0.03 : 0.08;

  return {
    action, confidence, confidencePct,
    entryLow: price * 0.995, entryHigh: price * 1.005,
    stopLoss: isUp ? price * (1 - stopPct) : price * (1 + stopPct),
    target1: isUp ? price * (1 + targetPct) : price * (1 - targetPct),
    target2: isUp ? price * (1 + targetPct * 1.8) : price * (1 - targetPct * 1.8),
    predict1d: changePct * 0.3, predict1w: changePct * 0.8, predict1m: changePct * 1.5,
    bullish: isUp ? 50 + Math.min(30, magnitude * 5) : 50 - Math.min(30, magnitude * 5),
    bearish: isUp ? 50 - Math.min(30, magnitude * 5) : 50 + Math.min(30, magnitude * 5),
    reasons: [
      `24h price change is ${changePct >= 0 ? "+" : ""}${changePct.toFixed(2)}%`,
      `${magnitude > 1 ? "Notable" : "Limited"} momentum based on recent move`,
      "Rule-based estimate — add an Anthropic API key for AI-generated analysis"
    ],
    risks: ["Rule-based logic, not AI-generated — verify independently", "Markets can reverse quickly; use proper risk management"],
    dubai: `${a.label} is actively traded by Dubai-based traders during GMT+4 hours. Add your Anthropic API key above for live AI-generated Dubai market context.`,
    macro: "Add your Anthropic API key above to unlock live AI-generated macro analysis instead of this rule-based estimate.",
    isRuleBased: true
  };
}

// ---------- Analysis fetch + cache ----------
async function ensureAnalysis(assetId) {
  const existing = state.analysis[assetId];
  const now = Date.now();
  const apiKey = getStoredApiKey();

  if (!apiKey) {
    // No key: use rule-based fallback, refresh whenever price changes meaningfully (cheap, no API cost)
    const price = getPrice(assetId);
    const change = getChange(assetId);
    state.analysis[assetId] = { data: ruleBasedAnalysis(assetId, price, change), fetchedAt: now, loading: false, error: false, ruleBased: true };
    render();
    return;
  }

  if (existing && !existing.error && !existing.ruleBased && (now - existing.fetchedAt) < ANALYSIS_REFRESH_MS) return;
  if (existing && existing.loading) return;

  state.analysis[assetId] = { ...(existing || {}), loading: true };
  render();

  try {
    const a = getAsset(assetId);
    const price = getPrice(assetId);
    const change = getChange(assetId);
    const data = await fetchClaudeAnalysis(a.sym, price, change, apiKey);
    state.analysis[assetId] = { data, fetchedAt: Date.now(), loading: false, error: false, ruleBased: false };
  } catch (e) {
    console.warn("Claude analysis fetch failed for " + assetId + ":", e.message);
    const price = getPrice(assetId);
    const change = getChange(assetId);
    state.analysis[assetId] = {
      data: ruleBasedAnalysis(assetId, price, change),
      fetchedAt: Date.now(), loading: false, error: true, errorMsg: e.message, ruleBased: true
    };
  }
  render();
}

// (fallbackAnalysis removed — ruleBasedAnalysis now covers the no-key and error cases)

// ---------- Rule-based chat reply (used when no API key is set) ----------
function ruleBasedChatReply(assetId, price, change, query) {
  const a = getAsset(assetId);
  const data = (state.analysis[assetId] && state.analysis[assetId].data) || ruleBasedAnalysis(assetId, price, change);
  const lower = query.toLowerCase();

  if (lower.includes("predict") || lower.includes("forecast")) {
    return `📈 ${a.sym} FORECAST (rule-based, no AI key set)\n\n1-Day: ${data.predict1d >= 0 ? "+" : ""}${data.predict1d.toFixed(1)}%\n1-Week: ${data.predict1w >= 0 ? "+" : ""}${data.predict1w.toFixed(1)}%\n1-Month: ${data.predict1m >= 0 ? "+" : ""}${data.predict1m.toFixed(1)}%\n\nThis is a simple estimate based on recent price momentum, not AI analysis. Add your Anthropic API key above (gear icon) for real AI-generated forecasts.`;
  }
  if (lower.includes("dubai") || lower.includes("uae")) {
    return `🏛️ ${data.dubai}`;
  }
  return `📊 ${a.sym} — ${formatPrice(assetId, price)} (${change >= 0 ? "▲" : "▼"} ${Math.abs(change).toFixed(2)}%)\n\nSignal: ${data.action} (rule-based, ${data.confidencePct}% confidence)\nEntry: ${formatPrice(assetId,data.entryLow)}–${formatPrice(assetId,data.entryHigh)}\nStop Loss: ${formatPrice(assetId,data.stopLoss)}\n\nThis is a basic rule-based response. For real AI-powered chat and analysis, add your Anthropic API key using the key icon above — it's free to get a key, and you control your own usage/spend.`;
}

// ---------- Chat ----------
async function sendMessage(customQuery) {
  const inputEl = document.getElementById("chatInput");
  const query = (customQuery !== undefined ? customQuery : (inputEl ? inputEl.value : "")).trim();
  if (!query || state.isChatLoading) return;

  if (inputEl) inputEl.value = "";
  const assetId = state.asset;
  if (!state.messages[assetId]) state.messages[assetId] = [];
  state.messages[assetId].push({ role: "user", text: query });

  const apiKey = getStoredApiKey();
  const price = getPrice(assetId);
  const change = getChange(assetId);

  if (!apiKey) {
    // No key: instant rule-based reply, no network call, no cost
    state.messages[assetId].push({ role: "assistant", text: ruleBasedChatReply(assetId, price, change, query) });
    render();
    return;
  }

  state.isChatLoading = true;
  render();

  try {
    const a = getAsset(assetId);
    const analysisEntry = state.analysis[assetId];
    const reply = await fetchClaudeChatReply(a.sym, price, change, analysisEntry?.data, state.messages[assetId], query, apiKey);
    state.messages[assetId].push({ role: "assistant", text: reply });
  } catch (e) {
    console.warn("Chat reply failed:", e.message);
    const msg = e.message === "NO_API_KEY"
      ? "Add your Anthropic API key (key icon above) to enable AI chat."
      : "⚠️ Couldn't reach Claude right now (" + e.message.slice(0, 100) + "). Please try again in a moment.";
    state.messages[assetId].push({ role: "assistant", text: msg });
  }
  state.isChatLoading = false;
  render();
}

// ---------- Alerts ----------
function checkAlerts() {
  const assetId = state.asset;
  const analysisEntry = state.analysis[assetId];
  if (!analysisEntry || !analysisEntry.data) return;
  const price = getPrice(assetId);
  const data = analysisEntry.data;
  const a = getAsset(assetId);

  if (!checkAlerts._flagged) checkAlerts._flagged = {};
  const flagKeySL = assetId + "_sl";
  const flagKeyT1 = assetId + "_t1";

  if (price <= data.stopLoss && !checkAlerts._flagged[flagKeySL]) {
    checkAlerts._flagged[flagKeySL] = true;
    pushAlert(`⚠️ ${a.sym} near Stop Loss ${data.stopLoss}!`);
  }
  if (price >= data.target1 && !checkAlerts._flagged[flagKeyT1]) {
    checkAlerts._flagged[flagKeyT1] = true;
    pushAlert(`🎯 ${a.sym} hit Target 1: ${data.target1}!`);
  }
}
function pushAlert(text) {
  state.alerts = [text, ...state.alerts].slice(0, 3);
  render();
  setTimeout(() => { state.alerts = state.alerts.slice(0, -1); render(); }, 5000);
}

        <div style="background:rgba(13,20,33,0.9);border:1px solid ${isUp ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)'};border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">

            <div style="font-size:9px;color:#475569;margin-bottom:4px;">${period} FORECAST</div>

        <div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:9px;">Bullish</span><span style="font-size:9px;color:#10B981;">${data.bullish}%</span></div><div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;"><div style="height:4px;width:${data.bullish}%;background:#10B981;border-radius:2px;"></div></div></div>
        <div><div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="font-size:9px;">Bearish</span><span style="font-size:9px;color:#EF4444;">${data.bearish}%</span></div><div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;"><div style="height:4px;width:${data.bearish}%;background:#EF4444;border-radius:2px;"></div></div></div>
      </div>

      <div style="background:rgba(13,20,33,0.9);border-radius:12px;padding:14px;">
        <div style="font-size:9px;color:#475569;margin-bottom:8px;text-transform:uppercase;">AI Analysis Reasons</div>
        ${(data.reasons||[]).slice(0,5).map((r,i) => `<div style="display:flex;gap:8px;margin-bottom:8px;"><span style="font-size:10px;color:#f59e0b;">${i+1}.</span><span style="font-size:11px;color:#94A3B8;line-height:1.5;">${esc(r)}</span></div>`).join("")}

      </div>

        <div style="font-size:11px;color:#94A3B8;line-height:1.6;">${esc(data.macro)}</div>

}

function scrollChatToBottom() {
  const el = document.getElementById("mainContent");
  if (el && state.activeTab === "chat") el.scrollTop = el.scrollHeight;
}

function attachHandlers() {
  document.querySelectorAll(".asset-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.asset = btn.getAttribute("data-asset");
      render();
      ensureAnalysis(state.asset);
    });
  });
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.activeTab = btn.getAttribute("data-tab");
      render();
    });
  });
  document.querySelectorAll(".quick-q").forEach(btn => {
    btn.addEventListener("click", () => sendMessage(btn.getAttribute("data-q")));
  });
  const sendBtn = document.getElementById("sendBtn");
  if (sendBtn) sendBtn.addEventListener("click", () => sendMessage());
  const inputEl = document.getElementById("chatInput");
  if (inputEl) {
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  }

  const keyToggleBtn = document.getElementById("keyToggleBtn");
  if (keyToggleBtn) {
    keyToggleBtn.addEventListener("click", () => {
      state.showKeyPanel = !state.showKeyPanel;
      render();
    });
  }
  const saveKeyBtn = document.getElementById("saveKeyBtn");
  if (saveKeyBtn) {
    saveKeyBtn.addEventListener("click", () => {
      const keyInput = document.getElementById("apiKeyInput");
      const newKey = keyInput ? keyInput.value.trim() : "";
      setStoredApiKey(newKey);
      state.showKeyPanel = false;
      // Force re-fetch of analysis for current asset with the new key
      state.analysis[state.asset] = null;
      render();
      ensureAnalysis(state.asset);
    });
  }
  const clearKeyBtn = document.getElementById("clearKeyBtn");
  if (clearKeyBtn) {
    clearKeyBtn.addEventListener("click", () => {
      setStoredApiKey("");
      state.analysis[state.asset] = null;
      render();
      ensureAnalysis(state.asset);
    });
  }
}

// ============================================================
// INIT
// ============================================================
async function initPrices() {
  const fetched = await fetchAllPrices();
  state.prices = { ...state.prices, ...fetched };
  state.lastPriceFetch = Date.now();
  render();
  checkAlerts();
}

window.addEventListener("load", async () => {
  render(); // initial render with fallback prices
  await initPrices();
  ensureAnalysis(state.asset);

  setInterval(initPrices, PRICE_REFRESH_MS);
  setInterval(() => ensureAnalysis(state.asset), ANALYSIS_REFRESH_MS);
});
</script>

function aeGetAsset() { return AE_ASSETS.find(a => a.id === aeState.asset); }

function aeGetApiKey() {

}

function aeEsc(str) {
  const div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;

// ---------- Calculator math ----------
function aeComputeLotSizing() {
  const asset = aeGetAsset();
  const slPips = aeState.sl.pips || 1;
  const contractUnits = aeState.cryptoContractOverride[aeState.asset] ?? asset.defaultLot;

  // Pip value per 1.00 lot, scaled for asset type
  let pipValuePerStandardLot;
  if (asset.isCrypto) {
    // 1 lot = contractUnits of the asset (user-adjustable). Pip = $1 move per unit by default for crypto (point-based, not traditional pips).
    pipValuePerStandardLot = contractUnits;
  } else if (asset.brokerVaries) {
    // Silver/Oil: pip value per standard lot varies significantly by broker's contract size convention.
    // Use the user's override if set, otherwise the rough default — always editable in the UI.
    pipValuePerStandardLot = (aeState.pipValueOverride[aeState.asset] ?? asset.pipValuePerLotUSD) * 100;
  } else {
    pipValuePerStandardLot = asset.pipValuePerLotUSD * 100; // gold convention: $1/pip at 0.01 lot => $100/pip at 1.00 lot
  }

  let lots = [];
  if (aeState.account.mode === "fixed") {
    // Live account: fixed lot per entry, repeated across active entries
    const fixedLot = aeState.account.lotPerEntry;
    for (let i = 0; i < aeState.tpCount; i++) lots.push(fixedLot);
  } else {
    // Funded account: risk-based sizing
    const riskUSD = aeState.account.equity * (aeState.account.riskPct / 100);
    if (aeState.ratioMode === "manual") {
      const parts = [aeState.ratioParts.e1, aeState.ratioParts.e2, aeState.ratioParts.e3].slice(0, aeState.tpCount);
      const totalParts = parts.reduce((a, b) => a + b, 0) || 1;
      parts.forEach(p => {
        const entryRiskUSD = riskUSD * (p / totalParts);
        const lot = entryRiskUSD / (slPips * pipValuePerStandardLot);
        lots.push(lot);
      });
    } else {
      // Optimizer: size E1+E2 to hit targetProfit combined at TP1+TP2, E3 takes remaining risk
      // Simplified proportional approach: split riskUSD evenly first, then scale E1/E2 by their R:R to hit target
      const baseRiskPerEntry = riskUSD / aeState.tpCount;
      for (let i = 0; i < aeState.tpCount; i++) {
        const lot = baseRiskPerEntry / (slPips * pipValuePerStandardLot);
        lots.push(lot);
      }
    }
  }
  return { lots, pipValuePerStandardLot, slPips };
}

function aeComputeEntryResults() {
  const { lots, pipValuePerStandardLot, slPips } = aeComputeLotSizing();
  const rrValues = [aeState.tpRR.tp1, aeState.tpRR.tp2, aeState.tpRR.tp3].slice(0, aeState.tpCount);

  const entries = lots.map((lot, i) => {
    const riskUSD = lot * slPips * pipValuePerStandardLot;
    const rr = rrValues[i] || 1;
    const tpPips = slPips * rr;
    const rewardUSD = lot * tpPips * pipValuePerStandardLot;
    return { entryNum: i + 1, lot, riskUSD, rewardUSD, rr, tpPips };
  });

  const totalRisk = entries.reduce((sum, e) => sum + e.riskUSD, 0);
  const maxReward = entries.reduce((sum, e) => sum + e.rewardUSD, 0);
  const equity = aeState.account.equity || 1;
  const pctOfEquity = (totalRisk / equity) * 100;
  const combinedRR = totalRisk > 0 ? (maxReward / totalRisk) : 0;

  // Locked-in profit logic (TP1+TP2 banked, TP3 rides risk-free if E1+E2 hit)
  const lockedIn = entries.slice(0, Math.min(2, entries.length)).reduce((sum, e) => sum + e.rewardUSD, 0);
  const rideProfit = entries.length > 2 ? entries[2].rewardUSD : 0;

  return { entries, totalRisk, maxReward, pctOfEquity, combinedRR, lockedIn, rideProfit };
}

            <div style="font-size:9px;color:#475569;">${e.lot.toFixed(3)} lots · R:R 1:${e.rr}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;color:#10B981;">+$${e.rewardUSD.toFixed(2)}</div>
            <div style="font-size:9px;color:#F87171;">-$${e.riskUSD.toFixed(2)} risk</div>
          </div>
        </div>
      `).join("")}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;">
        <div style="background:rgba(239,68,68,0.08);border-radius:8px;padding:10px;">
          <div style="font-size:9px;color:#475569;">Total Risk</div>
          <div style="font-size:14px;font-weight:700;color:#F87171;">$${results.totalRisk.toFixed(2)}</div>
          <div style="font-size:9px;color:#475569;">${results.pctOfEquity.toFixed(2)}% of equity</div>
        </div>
        <div style="background:rgba(16,185,129,0.08);border-radius:8px;padding:10px;">
          <div style="font-size:9px;color:#475569;">Max Reward</div>
          <div style="font-size:14px;font-weight:700;color:#10B981;">$${results.maxReward.toFixed(2)}</div>
          <div style="font-size:9px;color:#475569;">Combined R:R 1:${results.combinedRR.toFixed(1)}</div>
        </div>
      </div>
      ${aeState.tpCount > 2 ? `
        <div style="margin-top:10px;font-size:10px;color:#94A3B8;line-height:1.5;">
          <strong style="color:#f59e0b;">Strategy:</strong> Entries 1 & 2 bank $${results.lockedIn.toFixed(2)} combined at TP1+TP2. Entry 3 rides risk-free toward TP3 (move to breakeven once TP1+TP2 hit) for an additional $${results.rideProfit.toFixed(2)}.
        </div>
      ` : ""}
    </div>

    <button id="aeLogFromCalc" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:10px;padding:12px;color:#000;font-size:11px;font-weight:700;cursor:pointer;">+ Log This Trade</button>
  `;
}

function aeRenderLogView() {
  const trades = aeState.trades;
  const open = trades.filter(t => t.status === "open").length;
  const closed = trades.filter(t => t.status === "closed").length;
  const wins = trades.filter(t => t.status === "closed" && t.pnl > 0).length;
  const winRate = closed > 0 ? ((wins / closed) * 100).toFixed(0) + "%" : "—";
  const totalPnl = trades.filter(t => t.status === "closed").reduce((sum, t) => sum + (t.pnl || 0), 0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#f59e0b;">📋 Daily Trade Log</div>
      <button id="aeNewTradeBtn" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:6px 12px;color:#f59e0b;font-size:10px;font-weight:700;cursor:pointer;">+ New Trade</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
      <div style="background:rgba(13,20,33,0.9);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:16px;font-weight:700;">${trades.length}</div>
        <div style="font-size:9px;color:#475569;">Trades</div>
      </div>
      <div style="background:rgba(13,20,33,0.9);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:#f59e0b;">${open}</div>
        <div style="font-size:9px;color:#475569;">Open</div>
      </div>
      <div style="background:rgba(13,20,33,0.9);border-radius:8px;padding:10px;text-align:center;">
        <div style="font-size:16px;font-weight:700;color:${totalPnl >= 0 ? '#10B981' : '#EF4444'};">$${totalPnl.toFixed(0)}</div>
        <div style="font-size:9px;color:#475569;">P&L</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:14px;padding:0 4px;">
      <span>Closed: ${closed}</span><span>Win Rate: ${winRate}</span>
    </div>

    ${trades.length === 0 ? `
      <div style="text-align:center;padding:30px 20px;color:#475569;font-size:11px;">No trades logged yet this session.<br>Trades reset on page reload (session-only for now).</div>
    ` : trades.slice().reverse().map(t => `
      <div style="background:rgba(13,20,33,0.9);border-left:3px solid ${t.direction==='LONG'?'#10B981':'#EF4444'};border-radius:10px;padding:12px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:11px;font-weight:700;color:${t.direction==='LONG'?'#10B981':'#EF4444'};">${t.direction} · ${aeEsc(t.asset || 'XAUUSD')}</span>
          <span style="font-size:9px;color:#475569;">${new Date(t.timestamp).toLocaleTimeString()}</span>
        </div>
        <div style="font-size:10px;color:#94A3B8;">Entry: ${t.entry || '—'} · SL: ${t.slPips || '—'} pips</div>
        ${t.notes ? `<div style="font-size:10px;color:#475569;margin-top:4px;">${aeEsc(t.notes)}</div>` : ""}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
          <span style="font-size:9px;padding:2px 8px;border-radius:10px;background:${t.status==='open'?'rgba(245,158,11,0.15)':'rgba(255,255,255,0.05)'};color:${t.status==='open'?'#f59e0b':'#94A3B8'};">${t.status.toUpperCase()}</span>
          ${t.status==='open' ? `<button data-close-trade="${t.id}" style="background:none;border:none;color:#475569;font-size:9px;text-decoration:underline;cursor:pointer;">Mark closed</button>` : `<span style="font-size:10px;color:${t.pnl>=0?'#10B981':'#EF4444'};">${t.pnl>=0?'+':''}$${(t.pnl||0).toFixed(2)}</span>`}
        </div>
      </div>
    `).join("")}
  `;
}

function aeRenderConnectView() {
  return `
    <div style="background:rgba(13,20,33,0.9);border-radius:12px;padding:16px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:10px;">⚡ VPS Endpoint Config</div>
      <div style="font-size:10px;color:#94A3B8;line-height:1.5;margin-bottom:10px;">Point to your own VPS server running a status API. This page will poll <code style="color:#f59e0b;">/status</code>, <code style="color:#f59e0b;">/positions</code> and <code style="color:#f59e0b;">/alerts</code> for live MT5 position and Telegram data. Requires your own backend — this static page cannot run that server itself.</div>
      <input id="aeVpsInput" type="text" placeholder="http://YOUR-VPS-IP:3000" value="${aeEsc(aeState.vpsEndpoint)}" style="width:100%;background:rgba(7,9,15,0.8);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;color:#e2e8f0;font-size:12px;margin-bottom:8px;" />
      <button id="aeVpsConnectBtn" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:8px;padding:10px;color:#000;font-size:11px;font-weight:700;cursor:pointer;">Connect</button>
      <div style="margin-top:10px;font-size:10px;color:${aeState.vpsConnected ? '#10B981' : '#475569'};">${aeState.vpsConnected ? '✅ Connected' : '○ Not connected'}</div>
    </div>

    <div style="background:rgba(13,20,33,0.9);border-radius:12px;padding:16px;margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:10px;">Live Positions — MT5</div>
      ${aeState.vpsConnected ? `<div style="font-size:10px;color:#475569;">No open positions reported.</div>` : `<div style="font-size:10px;color:#475569;">Connect your VPS endpoint above to see live MT5 positions here.</div>`}
    </div>

    <div style="background:rgba(13,20,33,0.9);border-radius:12px;padding:16px;">
      <div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:10px;">✈ Telegram Alerts</div>
      <div style="font-size:10px;color:#475569;">Telegram alerts are sent from your VPS via your own bot. Configure your bot token and chat ID on your server — this page only displays status once connected.</div>
    </div>
  `;
}

// ---------- Claude vision analysis for uploaded charts ----------
async function aeAnalyzeCharts() {
  const apiKey = aeGetApiKey();
  if (!apiKey) return;

  const images = Object.entries(aeState.charts).filter(([tf, data]) => data);
  if (images.length === 0) return;

  aeState.scanLoading = true;
  aeState.scanError = null;
  aeRender();

  try {
    const content = [
      { type: "text", text: `You are analyzing trading charts for AURUM ENGINE, an SMC/ICT (Smart Money Concepts) trading system. I've uploaded ${images.length} chart screenshot(s): ${images.map(([tf]) => tf.toUpperCase()).join(", ")}.

Analyze these charts against this 10-rule checklist:
${AE_RULES.flatMap(s => s.items).map(r => `${r.id}. ${r.title}: ${r.desc}`).join("\n")}

Respond ONLY with valid JSON, no markdown, in this exact shape:
{
  "bias": "BUY" | "SELL" | "NEUTRAL",
  "checklist": { "1": true|false, "2": true|false, ..., "10": true|false },
  "keyZones": "<brief description of key support/resistance/OB/FVG zones identified>",
  "notes": "<2-3 sentence analysis summary>"
}` }
    ];

    images.forEach(([tf, dataUrl]) => {
      const base64 = dataUrl.split(",")[1];
      const mediaType = dataUrl.match(/data:(image\/[a-z]+);/)?.[1] || "image/png";
      content.push({ type: "image", source: { type: "base64", media_type: mediaType, data: base64 } });
    });

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{ role: "user", content }]
      })
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error(`Claude API HTTP ${res.status}: ${errText.slice(0, 150)}`);
    }

    const data = await res.json();
    const textBlock = data.content?.find(b => b.type === "text");
    if (!textBlock) throw new Error("No text in Claude response");
    let cleaned = textBlock.text.trim().replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "");
    aeState.scanData = JSON.parse(cleaned);
  } catch (e) {
    console.warn("Chart analysis failed:", e.message);
    aeState.scanError = e.message;
  }
  aeState.scanLoading = false;
  aeRender();
}

// ---------- Event handlers ----------
function aeAttachHandlers() {
  document.querySelectorAll(".ae-view-btn").forEach(btn => {
    btn.addEventListener("click", () => { aeState.activeView = btn.getAttribute("data-aeview"); aeRender(); });
  });

  document.querySelectorAll('[data-chart-tf]').forEach(input => {
    input.addEventListener("change", (e) => {
      const tf = input.getAttribute("data-chart-tf");
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        aeState.charts[tf] = ev.target.result;
        aeRender();
      };
      reader.readAsDataURL(file);
    });
  });

  const analyzeBtn = document.getElementById("aeAnalyzeChartsBtn");
  if (analyzeBtn) analyzeBtn.addEventListener("click", aeAnalyzeCharts);

  const copyPrompt = document.getElementById("aeCopyPrompt");
  if (copyPrompt) {
    copyPrompt.addEventListener("click", () => {
      navigator.clipboard?.writeText(copyPrompt.textContent).catch(() => {});
      copyPrompt.style.opacity = "0.5";
      setTimeout(() => { copyPrompt.style.opacity = "1"; }, 200);
    });
  }

  document.querySelectorAll(".ae-rule-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const ruleId = btn.getAttribute("data-rule");
      const val = btn.getAttribute("data-val") === "true";
      aeState.manualChecklist[ruleId] = val;
      aeRender();
    });
  });
  const resetChecklist = document.getElementById("aeResetChecklist");
  if (resetChecklist) resetChecklist.addEventListener("click", () => { aeState.manualChecklist = {}; aeRender(); });
  const goToCalc = document.getElementById("aeGoToCalcFromChecklist");
  if (goToCalc) goToCalc.addEventListener("click", () => { aeState.activeView = "calc"; aeRender(); });

  const assetSelect = document.getElementById("aeAssetSelect");
  if (assetSelect) assetSelect.addEventListener("change", (e) => { aeState.asset = e.target.value; aeRender(); });
  const cryptoContract = document.getElementById("aeCryptoContract");
  if (cryptoContract) cryptoContract.addEventListener("change", (e) => {
    aeState.cryptoContractOverride[aeState.asset] = parseFloat(e.target.value) || 1;
    aeRender();
  });
  const pipValueOverride = document.getElementById("aePipValueOverride");
  if (pipValueOverride) pipValueOverride.addEventListener("change", (e) => {
    aeState.pipValueOverride[aeState.asset] = parseFloat(e.target.value) || 0.01;
    aeRender();
  });

  document.querySelectorAll(".ae-acct-mode-btn").forEach(btn => {
    btn.addEventListener("click", () => { aeState.account.mode = btn.getAttribute("data-acct-mode"); aeRender(); });
  });
  const lotPerEntry = document.getElementById("aeLotPerEntry");
  if (lotPerEntry) lotPerEntry.addEventListener("change", (e) => { aeState.account.lotPerEntry = parseFloat(e.target.value) || 0.01; aeRender(); });
  const equityInput = document.getElementById("aeEquity");
  if (equityInput) equityInput.addEventListener("change", (e) => { aeState.account.equity = parseFloat(e.target.value) || 0; aeRender(); });
  const riskPctInput = document.getElementById("aeRiskPct");
  if (riskPctInput) riskPctInput.addEventListener("change", (e) => { aeState.account.riskPct = parseFloat(e.target.value) || 0; aeRender(); });

  const slPipsInput = document.getElementById("aeSlPips");
  if (slPipsInput) slPipsInput.addEventListener("change", (e) => { aeState.sl.pips = parseFloat(e.target.value) || 1; aeRender(); });

  document.querySelectorAll(".ae-tpcount-btn").forEach(btn => {
    btn.addEventListener("click", () => { aeState.tpCount = parseInt(btn.getAttribute("data-tpcount")); aeRender(); });
  });
  document.querySelectorAll('[data-tprr]').forEach(input => {
    input.addEventListener("change", (e) => {
      const n = input.getAttribute("data-tprr");
      aeState.tpRR["tp" + n] = parseFloat(e.target.value) || 1;
      aeRender();
    });
  });

  const logFromCalc = document.getElementById("aeLogFromCalc");
  if (logFromCalc) logFromCalc.addEventListener("click", () => {
    const results = aeComputeEntryResults();
    aeState.trades.push({
      id: Date.now(),
      timestamp: Date.now(),
      asset: aeGetAsset().label,
      direction: "LONG", // default; quick-add doesn't ask, full "New Trade" form does
      entry: "—",
      slPips: aeState.sl.pips,
      status: "open",
      notes: `Logged from calculator: ${aeState.tpCount} entries, total risk $${results.totalRisk.toFixed(2)}`,
      pnl: 0
    });
    aeState.activeView = "log";
    aeRender();
  });

  const newTradeBtn = document.getElementById("aeNewTradeBtn");
  if (newTradeBtn) newTradeBtn.addEventListener("click", aeShowNewTradeModal);

  document.querySelectorAll('[data-close-trade]').forEach(btn => {
    btn.addEventListener("click", () => {
      const id = parseFloat(btn.getAttribute("data-close-trade"));
      const trade = aeState.trades.find(t => t.id === id);
      if (trade) {
        const pnlStr = prompt("Enter P&L for this trade (USD, negative for loss):", "0");
        if (pnlStr !== null) {
          trade.status = "closed";
          trade.pnl = parseFloat(pnlStr) || 0;
          aeRender();
        }
      }
    });
  });

  const vpsConnectBtn = document.getElementById("aeVpsConnectBtn");
  if (vpsConnectBtn) {
    vpsConnectBtn.addEventListener("click", async () => {
      const input = document.getElementById("aeVpsInput");
      aeState.vpsEndpoint = input ? input.value.trim() : "";
      if (!aeState.vpsEndpoint) { aeRender(); return; }
      try {
        const res = await fetch(aeState.vpsEndpoint + "/status", { mode: "cors" });
        aeState.vpsConnected = res.ok;
      } catch (e) {
        aeState.vpsConnected = false;
        console.warn("VPS connect failed:", e.message);
      }
      aeRender();
    });
  }
}

function aeShowNewTradeModal() {
  const direction = confirm("Click OK for LONG, Cancel for SHORT") ? "LONG" : "SHORT";
  const entry = prompt("Entry price:", "");
  const slPips = prompt("Stop loss distance (pips/points):", aeState.sl.pips);
  const notes = prompt("Notes (optional):", "");
  aeState.trades.push({
    id: Date.now(),
    timestamp: Date.now(),
    asset: aeGetAsset().label,
    direction,
    entry: entry || "—",
    slPips: slPips || aeState.sl.pips,
    status: "open",
    notes: notes || "",
    pnl: 0
  });
  aeRender();
}

// ---------- Init ----------
window.initAurumEngine = function() {
  if (aeState.initialized) return;
  aeState.initialized = true;
  aeRender();
};

</script>
